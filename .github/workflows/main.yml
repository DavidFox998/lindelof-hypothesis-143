name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain leanprover/lean4:v4.12.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          
      - name: Lake build
        run: |
          lake update
          lake build
          
      - name: Check 0 sorry
        run: |
          lake env lean --run lean/RH_implies_Lindelof.lean
          echo "Build OK - 0 sorry check"
